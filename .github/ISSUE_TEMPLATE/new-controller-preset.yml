name: Request a controller preset
description: Ask for a new layout when you do not have JSON ready yet (or attach a draft).
title: "[Preset request]: "
body:
  - type: markdown
    attributes:
      value: |
        **Repository: [OpenRGB3DSpatialPresets](https://github.com/Wolfieeewolf/OpenRGB3DSpatialPresets)** (controller layout JSON only).

        Plugin bugs: [OpenRGB3DSpatialPlugin issues](https://github.com/Wolfieeewolf/OpenRGB3DSpatialPlugin/issues/new?template=bug_report.yml).

        If you already have a `.json` file, open a [pull request](https://github.com/Wolfieeewolf/OpenRGB3DSpatialPresets/compare) instead.

        Do not use **Blank issue** (maintainers only).

  - type: input
    id: brand_model
    attributes:
      label: Brand and model
      description: Hardware you want a preset for
      placeholder: "Corsair iCUE 220T RGB, Intel Arc A770 LE"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - "fans"
        - "graphics_cards"
        - "motherboards"
        - "ram_sticks"
        - "keyboards"
        - "mouses"
        - "mousemats"
        - "cpu_cooler"
        - "led_strips"
        - "headsets"
        - "speakers"
        - "cases"
        - "other category"
    validations:
      required: true

  - type: input
    id: openrgb_name
    attributes:
      label: OpenRGB device name (exact)
      description: As shown in OpenRGB device list (required for matching)
      placeholder: "Corsair SP120 RGB PRO"
    validations:
      required: true

  - type: textarea
    id: led_layout
    attributes:
      label: LED layout in OpenRGB
      description: Zones, LED counts, physical mapping
      placeholder: "Zone 0: 24 LEDs (3x8 front fans)"
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: When should someone use this preset?
      description: Single device vs kit; case position; simple vs ring layout
    validations:
      required: true

  - type: input
    id: product_url
    attributes:
      label: Product link (optional)
      placeholder: "https://..."

  - type: textarea
    id: draft_json
    attributes:
      label: Draft JSON or export (optional)
      description: Paste exported JSON or attach a file in a follow-up comment

  - type: dropdown
    id: willing_pr
    attributes:
      label: Contribution
      options:
        - "I can open a pull request with guidance"
        - "Request only - I cannot submit a PR"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else (optional)
      description: OpenRGB version, OS, related presets needed together
